<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التداول</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      background: #111827;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #1f2937;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #1f2937;
    }

    tr:hover {
      background: #111827;
    }

    .won { color: #22c55e; font-weight: bold; }
    .lost { color: #ef4444; font-weight: bold; }
  </style>
</head>

<body>

<header>لوحة الصفقات</header>

<table>
  <thead>
    <tr>
      <th>الشركة</th>
      <th>نوع</th>
      <th>دخول</th>
      <th>سعر</th>
      <th>أعلى</th>
      <th>%</th>
      <th>تاريخ</th>
      <th>حالة</th>
    </tr>
  </thead>
  <tbody id="body"></tbody>
</table>

<script>
function decodeShared() {
  const params = new URLSearchParams(window.location.search);
  const shared = params.get("shared");

  if (!shared) return [];

  try {
    // المرحلة 1: فك الترميز
    const decodedURI = decodeURIComponent(shared);

    // المرحلة 2: base64 decode
    const jsonString = atob(decodedURI);

    // المرحلة 3: تحويل إلى JSON
    const data = JSON.parse(jsonString);

    return Array.isArray(data) ? data : [];
  } catch (e) {
    console.log("خطأ في فك البيانات:", e);
    return [];
  }
}

function render() {
  const data = decodeShared();
  const body = document.getElementById("body");

  body.innerHTML = "";

  data.forEach(item => {
    const row = document.createElement("tr");

    const status =
      item.status === "won" ? "won" :
      item.status === "lost" ? "lost" : "";

    row.innerHTML = `
      <td>${item.companyName ?? "-"}</td>
      <td>${item.contractType ?? "-"}</td>
      <td>${item.entryPrice ?? "-"}</td>
      <td>${item.strikePrice ?? "-"}</td>
      <td>${item.highestPrice ?? "-"}</td>
      <td>${item.achievedPercent ? item.achievedPercent.toFixed(2) + "%" : "-"}</td>
      <td>${item.date ?? "-"}</td>
      <td class="${status}">${item.status ?? "-"}</td>
    `;

    body.appendChild(row);
  });
}

render();
</script>

</body>
</html>
</html>
