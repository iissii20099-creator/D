<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التداول</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      background: #111827;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #1f2937;
      text-align: center;
    }

    th {
      background: #1f2937;
    }

    tr:hover {
      background: #111827;
    }

    .won {
      color: #22c55e;
      font-weight: bold;
    }

    .lost {
      color: #ef4444;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>لوحة الصفقات</header>

<table>
  <thead>
    <tr>
      <th>الشركة</th>
      <th>نوع العقد</th>
      <th>سعر الدخول</th>
      <th>سعر التنفيذ</th>
      <th>أعلى سعر</th>
      <th>النسبة</th>
      <th>التاريخ</th>
      <th>الحالة</th>
    </tr>
  </thead>
  <tbody id="dataBody"></tbody>
</table>

<script>
function getData() {
  const params = new URLSearchParams(window.location.search);
  const shared = params.get("shared");

  if (!shared) return [];

  try {
    const decoded = decodeURIComponent(shared);
    return JSON.parse(decoded);
  } catch (e) {
    console.log("خطأ في قراءة البيانات", e);
    return [];
  }
}

function render() {
  const data = getData();
  const body = document.getElementById("dataBody");

  body.innerHTML = "";

  data.forEach(item => {
    const row = document.createElement("tr");

    const statusClass =
      item.status && item.status.includes("won") ? "won" :
      item.status && item.status.includes("lost") ? "lost" : "";

    row.innerHTML = `
      <td>${item.companyName || "-"}</td>
      <td>${item.contractType || "-"}</td>
      <td>${item.entryPrice || "-"}</td>
      <td>${item.strikePrice || "-"}</td>
      <td>${item.highestPrice || "-"}</td>
      <td>${item.achievedPercent ? item.achievedPercent.toFixed(2) + "%" : "-"}</td>
      <td>${item.date || "-"}</td>
      <td class="${statusClass}">${item.status || "-"}</td>
    `;

    body.appendChild(row);
  });
}

render();
</script>

</body>
</html>
